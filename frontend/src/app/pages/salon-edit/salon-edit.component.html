<div class="edit-container">
  <div *ngIf="isLoading" class="loading-state">⏳ Loading data...</div>
  <div *ngIf="errorMessage" class="error-state">⚠️ {{ errorMessage }}</div>

  <div *ngIf="salonData && !isLoading" class="content-box">

    <div class="header-actions">
      <h2>Edit Salon: {{ salonData.name }}</h2>
    </div>

    <div class="edit-form">
      <div class="form-group">
        <label>Salon Name</label>
        <input type="text" [(ngModel)]="salonData.name" class="form-input">
      </div>

      <div class="form-group-row">
        <div class="form-group">
          <label>Address</label>
          <input type="text" [(ngModel)]="salonData.address" class="form-input">
        </div>
        <div class="form-group">
          <label>District</label>
          <input type="text" [(ngModel)]="salonData.district" class="form-input">
        </div>
      </div>

      <div class="form-group-row">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" [(ngModel)]="salonData.phoneNumber" class="form-input">
        </div>
        <div class="form-group">
          <label>Price Range</label>
          <select [(ngModel)]="salonData.priceRange" class="form-input">
            <option value="CHEAP">Cheap</option>
            <option value="MODERATE">Moderate</option>
            <option value="EXPENSIVE">Expensive</option>
            <option value="LUXURY">Luxury</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="salonData.description" class="form-input" rows="5"></textarea>
      </div>

      <hr>

      <div class="button-group">
        <button class="cancel-btn" [routerLink]="['/salons', salonId]">Cancel</button>
        <button class="save-btn" (click)="saveChanges()" [disabled]="isSaving">
          {{ isSaving ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>

    </div>
  </div>
</div>
